; Multitrack recorder settings (read by the integrated recorder, never
; rewritten by m8c). Override the path at runtime with env M8C_RECORDER_CONFIG.
;
; Each value can also be overridden by an environment variable (shown below).

[recorder]
; Where session folders are created. A timestamped subfolder is made per take.
; env: M8C_REC_DIR    (~ is expanded)
output_dir=~/Music/m8c-recordings

; Optional take/song name. Folder becomes "<session_name>_<timestamp>".
; The M8 does not transmit its song name over the protocol, so set it here.
; Leave empty for timestamp-only folders. env: M8C_REC_NAME
session_name=

; Delete tracks that recorded only silence when a take stops. env: M8C_REC_DROP_SILENT
drop_silent=true

; Recording model:
;   recording happens  <=>  ARMED (via the arm CC)  AND  PLAYING (MIDI transport)
; So you arm a take by placing the arm CC in the song, then it records only
; while the sequencer is playing. Editing the CC just (dis)arms; nothing records
; until you press PLAY on the M8.

; Control Change number that ARMS/DISARMS recording (0-127). value >=64 = armed.
; env: M8C_REC_CC
arm_cc=100

; MIDI channel to listen on, 1-16. 0 = any channel. env: M8C_REC_CHANNEL
arm_channel=0

; Master monitoring: route the M8 master (channels 1-2) back out to a device.
; env: M8C_REC_MONITOR (true/false), M8C_REC_MONITOR_DEVICE (name substring)
monitor_enabled=true
monitor_output_device=M8

; Keyboard scancode that force-toggles recording, for testing without MIDI.
; Default 65 = F8 (SDL_SCANCODE_F8). env: M8C_REC_KEY
record_key=65
