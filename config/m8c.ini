; Known-good m8c config for the M8 multitrack setup (MacBook Air M2).
; Run with:  m8c --config config/m8c.ini
;
; Note: m8c rewrites its runtime config to the SDL pref path
; (~/Library/Application Support/m8c/...), so this versioned file is NOT
; overwritten and stays as the canonical reference.

[graphics]
fullscreen=false
wait_packets=256
integer_scaling=false

[audio]
; Enable monitoring: M8 input -> output device below.
audio_enabled=true
audio_buffer_size=0
; Send the processed/monitored return back INTO the M8 (post-mix insert).
; Matches the Dirtywave "M8" audio device by name substring.
audio_device_name=M8
